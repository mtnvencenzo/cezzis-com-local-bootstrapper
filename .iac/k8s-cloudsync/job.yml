apiVersion: batch/v1
kind: Job
metadata:
  name: cezzis-com-local-bootstrapper-cloudsync
  namespace: cezzis
  annotations:
    # Force + Replace tells ArgoCD to delete then recreate the Job on each sync
    # (Jobs are immutable - spec.selector and template labels can't be patched)
    argocd.argoproj.io/sync-options: Replace=true,Force=true
    argocd.argoproj.io/sync-wave: "400"
  labels:
    app: cezzis-com-local-bootstrapper-cloudsync
    app.kubernetes.io/part-of: cezzis
    app.kubernetes.io/managed-by: argocd
spec:
  template:
    metadata:
      labels:
        app: cezzis-com-local-bootstrapper-cloudsync
        app.kubernetes.io/part-of: cezzis
        app.kubernetes.io/managed-by: argocd
    spec:
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: cezzis-com-local-bootstrapper-cloudsync
          image: acrveceusgloshared001.azurecr.io/cezziscombootstrapper
          envFrom:
            - configMapRef:
                name: cezzis-com-local-bootstrapper-cloudsync-config
            - secretRef:
                name: cezzis-com-local-bootstrapper-cloudsync-shared-secrets
      restartPolicy: Never
